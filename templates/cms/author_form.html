{% extends 'cms/base_cms.html' %}

{% block title %}{{ action }} Author | CMS Control{% endblock %}

{% block cms_content %}
<div class="cms-header">
    <div>
        <h1 class="cms-title">{{ action }} Author</h1>
        <p style="color: var(--text-muted); margin-top: 5px;">{{ action }} profile card details for content creators.</p>
    </div>
    <a href="{% url 'cms:author_list' %}" class="btn btn-secondary btn-sm">
        <i data-lucide="arrow-left"></i>
        <span>Cancel</span>
    </a>
</div>

<div class="cms-card glass">
    <form method="POST" action="" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-grid">
            <!-- Name -->
            <div class="form-group">
                <label for="name">Author Full Name *</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ author.name }}" required placeholder="e.g. Sarah Jenkins">
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ author.email }}" required placeholder="e.g. sarah.j@example.com">
            </div>
            
            <!-- Designation -->
            <div class="form-group">
                <label for="designation">Designation / Role *</label>
                <input type="text" id="designation" name="designation" class="form-control" value="{{ author.designation }}" required placeholder="e.g. Senior DevOps Engineer">
            </div>
            
            <!-- Profile Image Selection -->
            <div class="form-group">
                <label for="profile_image_file">Profile Image File (Uploads to Firebase)</label>
                <input type="file" id="profile_image_file" name="profile_image_file" class="form-control" accept="image/*">
                
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">Or enter Image URL:</span>
                    <input type="text" id="profile_image_url" name="profile_image_url" class="form-control" value="{{ author.profile_image }}" placeholder="https://..." style="flex-grow: 1; padding: 6px 12px; font-size: 0.85rem;">
                </div>
            </div>
            
            <!-- Bio -->
            <div class="form-group form-full">
                <label for="bio">Bio Description</label>
                <textarea id="bio" name="bio" class="form-control" placeholder="Tell us about the author..." style="min-height: 100px;">{{ author.bio }}</textarea>
            </div>
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn btn-primary">
                <i data-lucide="save"></i>
                <span>Save Author</span>
            </button>
            <a href="{% url 'cms:author_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
