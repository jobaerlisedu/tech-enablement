<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ tutorial.title }}</title>
    
    <!-- Outfit & Inter Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Highlight.js CSS for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    
    <!-- Core embed styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #ffffff; /* White canvas background */
            color: #2d3748; /* Dark charcoal text */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 30px;
            font-size: 1rem;
            line-height: 1.6;
            overflow-y: auto;
        }

        /* Title styling */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a202c;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a202c;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 6px;
            margin-top: 32px;
            margin-bottom: 16px;
        }

        h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a202c;
            margin-top: 24px;
            margin-bottom: 12px;
        }

        p {
            margin-bottom: 16px;
            color: #2d3748;
        }

        ul, ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }

        li {
            margin-bottom: 8px;
        }

        pre {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            overflow-x: auto;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 0.88rem;
            background-color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
            color: #e11d48;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: #334155;
            font-size: 0.85rem;
            display: block;
        }

        a {
            color: #215c5c;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        blockquote {
            padding: 0 16px;
            color: #64748b;
            border-left: 4px solid #cbd5e1;
            margin-bottom: 16px;
        }

        table {
            border-spacing: 0;
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 24px;
        }

        table th, table td {
            padding: 8px 13px;
            border: 1px solid #e2e8f0;
        }

        table th {
            font-weight: 600;
            background-color: #f8fafc;
            color: #0f172a;
        }

        table tr:nth-child(even) {
            background-color: #f8fafc;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f4f9f4;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #215c5c;
        }
    </style>
</head>
<body>
    <div id="content-container">
        <h1>{{ tutorial.title }}</h1>
        <div id="markdown-output">Loading content...</div>
    </div>

    <!-- Raw Markdown source placeholder via json_script -->
    {{ tutorial.content|json_script:"raw-markdown-data" }}

    <!-- Markdown Parser & Code Highlighter -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const rawDataElem = document.getElementById("raw-markdown-data");
            if (!rawDataElem) return;
            
            const rawContent = JSON.parse(rawDataElem.textContent);
            const targetDiv = document.getElementById("markdown-output");

            // Compile marked to html with GFM and line breaks enabled
            targetDiv.innerHTML = marked.parse(rawContent, { gfm: true, breaks: true });

            // Highlight code blocks inside rendered content
            targetDiv.querySelectorAll('pre code').forEach(function(block) {
                hljs.highlightElement(block);
            });
        });
    </script>
</body>
</html>
