{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error | Tech Enablement</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/tech-enablement-favicon.png' %}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: clamp(80px, 18vw, 160px);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #e05252, #c0392b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }
        .error-title {
            font-size: clamp(20px, 4vw, 32px);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
        }
        .error-description {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 440px;
            margin: 0 auto 36px;
            line-height: 1.7;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="error-page">
        <div class="error-icon">⚙️</div>
        <div class="error-code">500</div>
        <h1 class="error-title">Something Went Wrong</h1>
        <p class="error-description">
            We encountered an unexpected server error. Our team has been notified.
            Please try again in a moment.
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">Go Home</a>
            <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
        </div>
    </main>
</body>
</html>
